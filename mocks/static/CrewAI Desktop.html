// ── tweaks-panel ─────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - e.clientY) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {
  return <><div className="twk-sect">{title}</div>{children}</>;
}

function TweakRow({ label, value, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row" style={{ flexDirection: 'row', alignItems: 'center', justifyContent: 'space-between' }}>
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakText });

};

window.createTask = function(projectId, title, firstMessage) {

    events: [{ kind: 'message', author: 'jordan', time: timeStr, body: firstMessage }],

};

    case 'auto':    return <svg {...s} viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5" {...p}/><path d="M8 4v4l2.5 1.5" {...p}/></svg>;
    case 'search':  return <svg {...s} viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5" {...p}/><path d="M10.5 10.5l3 3" {...p}/></svg>;
    case 'folder':  return <svg {...s} viewBox="0 0 16 16"><path d="M2 4.5a1 1 0 0 1 1-1h3l1.2 1.5H13a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4.5z" {...p}/></svg>;
    case 'folder-open': return <svg {...s} viewBox="0 0 16 16"><path d="M2 4.5a1 1 0 0 1 1-1h3l1.2 1.5H13a1 1 0 0 1 1 1v.5M2 5v7a1 1 0 0 0 1 1h10l1.5-5.5a.5.5 0 0 0-.5-.6H3.5a.5.5 0 0 0-.5.4L2 12" {...p}/></svg>;
    case 'gear':    return <svg {...s} viewBox="0 0 16 16"><circle cx="8" cy="8" r="2" {...p}/><path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4" {...p}/></svg>;
    case 'phone':   return <svg {...s} viewBox="0 0 16 16"><rect x="4.5" y="1.5" width="7" height="13" rx="1.5" {...p}/><line x1="7" y1="12.5" x2="9" y2="12.5" {...p}/></svg>;
    case 'chev':    return <svg {...s} viewBox="0 0 16 16"><path d="M6 4l4 4-4 4" {...p}/></svg>;
    default: return null;
  }
}

function NavItem({ icon, label, active, onClick }) {
  return (
    <div onClick={onClick} style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '6px 10px', margin: '1px 8px',
      borderRadius: 7, fontSize: 13, color: '#1C1A17',
      background: active ? '#EBE5D6' : 'transparent',
      cursor: 'pointer', userSelect: 'none',
    }}
    onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = '#EFE9DB'; }}
    onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
      <span style={{ color: '#5C544B', display: 'flex' }}><Icon name={icon} /></span>
      <span style={{ fontWeight: active ? 500 : 400 }}>{label}</span>
    </div>
  );
}

function ProjectGroup({ project, openIds, currentId, onToggle, onPick }) {
  const open = openIds.has(project.id);
  return (
    <div style={{ marginBottom: 2 }}>
      <div onClick={() => onToggle(project.id)} style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '5px 10px', margin: '1px 8px',
        borderRadius: 7, cursor: 'pointer', userSelect: 'none',
        fontSize: 12.5, color: '#3A352E', fontWeight: 500,
      }}>
        <span style={{ color: '#807972', display: 'flex', transform: open ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }}><Icon name="chev" size={11} /></span>
        <span style={{ color: '#807972', display: 'flex' }}><Icon name={open ? 'folder-open' : 'folder'} size={14} /></span>
        <span>{project.name}</span>
      </div>
      {open && (
        <div>
          {project.sessions.map(s => (
            <div key={s.id} onClick={() => onPick(s.id)} style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '5px 10px 5px 32px', margin: '1px 8px',
              borderRadius: 7, cursor: 'pointer', userSelect: 'none', fontSize: 12.5,
              background: currentId === s.id ? '#EBE5D6' : 'transparent',
              color: currentId === s.id ? '#1C1A17' : '#3A352E',
              fontWeight: currentId === s.id ? 500 : 400,
            }}
            onMouseEnter={(e) => { if (currentId !== s.id) e.currentTarget.style.background = '#EFE9DB'; }}
            onMouseLeave={(e) => { if (currentId !== s.id) e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.title}</span>
              <span style={{ color: '#A89F92', fontSize: 11, flexShrink: 0 }}>{s.age}</span>
              {s.status === 'running' && <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#C4644A', flexShrink: 0, boxShadow: '0 0 0 2px #FAF5E8' }} />}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Sidebar({ currentId, onPick, route, setRoute, deskName }) {
  const [openIds, setOpenIds] = React.useState(() => new Set(['crewai-desktop', 'research-portal', 'prodlead-skills']));
  const toggle = (id) => setOpenIds(prev => { const next = new Set(prev); if (next.has(id)) next.delete(id); else next.add(id); return next; });
  const iconBtnStyle = { width: 28, height: 28, border: 'none', background: 'transparent', borderRadius: 6, color: '#5C544B', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' };

  return (
    <div style={{ width: 264, height: '100%', background: '#F4EFE0', borderRight: '1px solid #E6DFCC', display: 'flex', flexDirection: 'column' }}>
      <div style={{ height: 38, display: 'flex', alignItems: 'center', padding: '0 14px', flexShrink: 0 }}>
        <TrafficLights /><WindowChromeButtons />
      </div>
      <div style={{ padding: '2px 0' }}>
        <NavItem icon="new"    label="New Task"          active={route === 'new'}    onClick={() => setRoute('new')} />
        <NavItem icon="search" label="Search"            active={route === 'search'} onClick={() => setRoute('search')} />
        <NavItem icon="agents" label="Agents"            active={route === 'agents' || route === 'skills' || route === 'runtimes'} onClick={() => setRoute('agents')} />
        <NavItem icon="auto"   label="Auto optimization" active={route === 'auto'}   onClick={() => setRoute('auto')} />
      </div>
      <div style={{ padding: '14px 18px 4px', fontSize: 11, fontWeight: 500, color: '#A89F92', letterSpacing: 0.3, textTransform: 'uppercase' }}>Projects</div>
      <div style={{ flex: 1, overflow: 'auto', paddingBottom: 8 }}>
        {window.PROJECTS.map(p => (
          <ProjectGroup key={p.id} project={p} openIds={openIds} currentId={currentId} onToggle={toggle}
            onPick={(sid) => { onPick(sid); setRoute('task'); }} />
        ))}
      </div>
      <div style={{ height: 44, borderTop: '1px solid #E6DFCC', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 4, flexShrink: 0, background: '#F0EAD8' }}>
        <button style={iconBtnStyle} title="Settings"><Icon name="gear" /></button>
        <span style={{ flex: 1, fontSize: 12.5, color: '#5C544B', fontWeight: 500, textAlign: 'center', letterSpacing: 0.1 }}>{deskName}</span>
        <button style={iconBtnStyle} title="Mobile app"><Icon name="phone" /></button>
      </div>
    </div>
  );
}

Object.assign(window, { Sidebar, Icon });
</script>

<script type="text/babel">
// ── task-view ─────────────────────────────────────────────────────────────────

const UI_FONT = '-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif';
const MONO_FONT = '"JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace';

function Avatar({ agent, size = 28 }) {
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: agent.color, color: '#FCFBF7', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.45, fontWeight: 600, flexShrink: 0, letterSpacing: 0.2 }}>{agent.initial}</div>
  );
}

function MetaPill({ children, dot, dotColor }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '3px 9px', borderRadius: 999, border: '1px solid #E6DFCC', background: '#FCFAF1', fontSize: 12, color: '#5C544B' }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: dotColor || '#C4644A' }} />}
      {children}
    </span>
  );
}

function TaskHeader({ task }) {
  return (
    <div style={{ padding: '20px 36px 16px', borderBottom: '1px solid #ECE6D5', background: '#FAF5E8' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, fontSize: 12.5, color: '#A89F92', marginBottom: 6 }}>
        <span style={{ fontFamily: MONO_FONT, color: '#5C544B' }}>{task.id}</span>
        <span>·</span>
        <span>opened {task.openedAt} ago by {window.AGENTS[task.openedBy].name}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
        <h1 style={{ flex: 1, margin: 0, fontSize: 22, fontWeight: 600, color: '#1C1A17', letterSpacing: -0.2, lineHeight: 1.2 }}>{task.title}</h1>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
          <button style={headerBtn} onClick={() => window.setTaskStatus(task.id, task.status === 'paused' ? 'running' : 'paused')}>
            {task.status === 'paused' ? 'Resume crew' : 'Pause crew'}
          </button>
          <button style={headerBtn}>Share…</button>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 6, marginTop: 12, flexWrap: 'wrap', alignItems: 'center' }}>
        <MetaPill dot dotColor={task.status === 'running' ? '#C4644A' : '#9C8F77'}>
          <span style={{ color: '#1C1A17', fontWeight: 500 }}>{task.status}</span>
        </MetaPill>
        {task.meta.map((m, i) => {
          if (m.startsWith('lead · ')) return <MetaPill key={i}><Avatar agent={window.AGENTS.aria} size={14}/> {m}</MetaPill>;
          return <MetaPill key={i}>{m}</MetaPill>;
        })}
      </div>
    </div>
  );
}

const headerBtn = { padding: '5px 12px', borderRadius: 6, fontSize: 12.5, fontWeight: 500, border: '1px solid #DCD3BC', background: '#FCFAF1', color: '#1C1A17', cursor: 'pointer', fontFamily: UI_FONT };

function RichText({ text }) {
  const parts = [];
  let last = 0;
  const re = /\{\{(file|ref):([^}]+)\}\}/g;
  let m;
  while ((m = re.exec(text))) {
    if (m.index > last) parts.push({ kind: 'text', value: text.slice(last, m.index) });
    parts.push({ kind: m[1], value: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ kind: 'text', value: text.slice(last) });
  return (
    <>
      {parts.map((p, i) => {
        if (p.kind === 'file') return <code key={i} style={{ fontFamily: MONO_FONT, fontSize: 12.5, color: '#C4644A', background: '#F7EFDD', padding: '1px 5px', borderRadius: 4 }}>{p.value}</code>;
        if (p.kind === 'ref') { const a = window.AGENTS[p.value]; if (!a) return p.value; return <span key={i} style={{ color: '#C4644A', fontWeight: 500 }}>@{a.name}</span>; }
        return <React.Fragment key={i}>{p.value}</React.Fragment>;
      })}
    </>
  );
}

function MessageEvent({ event }) {
  const a = window.AGENTS[event.author];
  return (
    <div style={{ display: 'flex', gap: 14, padding: '14px 0' }}>
      <Avatar agent={a} size={28} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, marginBottom: 4 }}>
          <span style={{ fontWeight: 600, color: '#1C1A17' }}>{a.name}</span>
          <span style={{ color: '#A89F92', marginLeft: 8 }}>· {event.time}</span>
        </div>
        <div style={{ fontSize: 14, color: '#1C1A17', lineHeight: 1.55 }}><RichText text={event.body} /></div>
      </div>
    </div>
  );
}

function ThinkingEvent({ event }) {
  const a = window.AGENTS[event.author];
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ display: 'flex', gap: 14, padding: '10px 0' }}>
      <Avatar agent={a} size={28} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
          <span style={{ fontWeight: 600, color: '#1C1A17' }}>{a.name}</span>
          <span style={{ color: '#A89F92' }}>· {event.time}</span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '2px 8px', borderRadius: 999, background: '#F7EFDD', color: '#C4644A', fontSize: 11.5, fontWeight: 500 }}>
            <svg width="11" height="11" viewBox="0 0 11 11"><circle cx="3" cy="5.5" r="1" fill="currentColor"/><circle cx="5.5" cy="5.5" r="1" fill="currentColor"/><circle cx="8" cy="5.5" r="1" fill="currentColor"/></svg>
            thought {event.seconds}s
          </span>
        </div>
        <div onClick={() => setOpen(!open)} style={{ fontSize: 13, color: '#807972', cursor: 'pointer', userSelect: 'none', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          <span style={{ transform: open ? 'rotate(90deg)' : 'none', display: 'inline-block', transition: 'transform 0.15s' }}>›</span>
          {open ? 'Hide reasoning' : 'Show reasoning'}
        </div>
        {open && <div style={{ marginTop: 8, padding: '10px 14px', borderRadius: 8, background: '#FAF5E8', border: '1px solid #ECE6D5', fontSize: 13, color: '#5C544B', lineHeight: 1.55, fontStyle: 'italic' }}>{event.reasoning}</div>}
      </div>
    </div>
  );
}

function ToolEvent({ event }) {
  const a = window.AGENTS[event.author];
  return (
    <div style={{ display: 'flex', gap: 14, padding: '10px 0' }}>
      <Avatar agent={a} size={28} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
          <span style={{ fontWeight: 600, color: '#1C1A17' }}>{a.name}</span>
          <span style={{ color: '#A89F92' }}>· {event.time}</span>
          <span style={ToolBadge}>
            <svg width="10" height="10" viewBox="0 0 10 10" style={{ marginRight: 3 }}><path d="M3 7l-1.5 1.5M6.5 3.5l1-1a1.4 1.4 0 0 1 2 2l-1 1M3 7l3.5-3.5 2 2L5 9 2 9.5 3 7z" stroke="currentColor" strokeWidth="0.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            {event.tool}
          </span>
        </div>
        <div style={{ border: '1px solid #ECE6D5', borderRadius: 8, background: '#FCFAF1', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ color: '#807972', display: 'flex' }}><svg width="13" height="13" viewBox="0 0 13 13"><path d="M2.5 2h5l3 3v6a1 1 0 0 1-1 1h-7a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z M7.5 2v3h3" stroke="currentColor" strokeWidth="1" fill="none" strokeLinejoin="round"/></svg></span>
          <code style={{ fontFamily: MONO_FONT, fontSize: 12.5, color: '#1C1A17', flex: 1 }}>{event.path}</code>
          <span style={{ fontSize: 12, color: '#6E9E5B', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
            {event.result}
          </span>
        </div>
        {event.detail && <div style={{ padding: '4px 14px 0', fontSize: 12, color: '#807972', fontFamily: MONO_FONT }}>{event.detail}</div>}
      </div>
    </div>
  );
}

const ToolBadge = { display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 999, background: '#F0EAD8', color: '#5C544B', fontSize: 11.5, fontWeight: 500, fontFamily: MONO_FONT };

function EditEvent({ event }) {
  const a = window.AGENTS[event.author];
  return (
    <div style={{ display: 'flex', gap: 14, padding: '10px 0' }}>
      <Avatar agent={a} size={28} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13.5, display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
          <span style={{ fontWeight: 600, color: '#1C1A17' }}>{a.name}</span>
          <span style={{ color: '#A89F92' }}>· {event.time}</span>
          <span style={ToolBadge}><svg width="10" height="10" viewBox="0 0 10 10" style={{ marginRight: 3 }}><path d="M5 2v6M2 5l3 3 3-3" stroke="currentColor" strokeWidth="1" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>edit</span>
          <span style={{ ...DiffPill, color: '#3E7A4A', background: '#E8F1DE' }}>+ {event.added}</span>
          <span style={{ ...DiffPill, color: '#A33F2B', background: '#F5DDD4' }}>− {event.removed}</span>
        </div>
        <div style={{ border: '1px solid #ECE6D5', borderRadius: 8, background: '#FCFAF1', overflow: 'hidden' }}>
          <div style={{ padding: '8px 14px', fontFamily: MONO_FONT, fontSize: 12.5, color: '#5C544B', borderBottom: '1px solid #ECE6D5' }}>{event.path}</div>
          <div style={{ fontFamily: MONO_FONT, fontSize: 12.5, lineHeight: 1.6 }}>
            {event.diff.map((line, i) => (
              <div key={i} style={{ padding: '1px 14px 1px 28px', position: 'relative', background: line.kind === 'add' ? '#E8F1DE' : line.kind === 'del' ? '#F5DDD4' : 'transparent', color: '#1C1A17', whiteSpace: 'pre' }}>
                <span style={{ position: 'absolute', left: 12, color: line.kind === 'add' ? '#3E7A4A' : line.kind === 'del' ? '#A33F2B' : '#A89F92' }}>{line.kind === 'add' ? '+' : line.kind === 'del' ? '−' : ' '}</span>
                {line.text}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const DiffPill = { display: 'inline-flex', alignItems: 'center', padding: '1px 8px', borderRadius: 999, fontSize: 11.5, fontWeight: 500, fontFamily: MONO_FONT };

function SubtaskBlock({ subtask }) {
  const [open, setOpen] = React.useState(true);
  const owner = window.AGENTS[subtask.owner];
  const statusDot = { running: '#C4644A', done: '#7A9C5F', queued: '#C9BFA8' }[subtask.status];
  return (
    <div style={{ margin: '14px 0 4px', borderRadius: 10, background: '#FAF5E8', border: '1px solid #ECE6D5', overflow: 'hidden' }}>
      <div onClick={() => setOpen(!open)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', cursor: 'pointer', userSelect: 'none' }}>
        <span style={{ color: '#807972', transform: open ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s', display: 'flex' }}>
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M3.5 2L7 5 3.5 8" stroke="currentColor" strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </span>
        <span style={{ width: 14, height: 14, borderRadius: '50%', border: `1.5px solid ${statusDot}`, background: subtask.status === 'done' ? statusDot : 'transparent', position: 'relative', flexShrink: 0 }}>
          {subtask.status === 'running' && <span style={{ position: 'absolute', inset: 3, borderRadius: '50%', background: statusDot }}/>}
          {subtask.status === 'done' && <svg width="10" height="10" viewBox="0 0 10 10" style={{ position: 'absolute', inset: 1.5 }}><path d="M2 5l2 2 4-4" stroke="#FCFBF7" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </span>
        <span style={{ fontSize: 13.5, fontWeight: 500, color: '#1C1A17' }}>
          <span style={{ color: '#A89F92', marginRight: 6, fontFamily: MONO_FONT, fontSize: 12.5 }}>{subtask.id.replace('st-', '')} ·</span>
          {subtask.title}
        </span>
        <div style={{ flex: 1 }} />
        <Avatar agent={owner} size={20} />
        <span style={{ fontSize: 12.5, color: '#5C544B' }}>{owner.name}</span>
      </div>
      {open && subtask.events.length > 0 && (
        <div style={{ padding: '0 16px 12px', borderTop: '1px solid #ECE6D5', background: '#FCFAF1' }}>
          {subtask.events.map((e, i) => <EventRouter key={i} event={e} />)}
        </div>
      )}
      {open && subtask.events.length === 0 && (
        <div style={{ padding: '14px 16px', borderTop: '1px solid #ECE6D5', background: '#FCFAF1', fontSize: 13, color: '#A89F92', fontStyle: 'italic' }}>Queued — will start when {owner.name} is free.</div>
      )}
    </div>
  );
}

function EventRouter({ event }) {
  if (event.kind === 'message')  return <MessageEvent event={event} />;
  if (event.kind === 'thinking') return <ThinkingEvent event={event} />;
  if (event.kind === 'tool')     return <ToolEvent event={event} />;
  if (event.kind === 'edit')     return <EditEvent event={event} />;
  if (event.kind === 'subtask')  return <SubtaskBlock subtask={event} />;
  return null;
}

const chip = { padding: '4px 10px', borderRadius: 6, fontSize: 12.5, border: '1px solid #E6DFCC', background: '#FCFAF1', color: '#5C544B', cursor: 'pointer', fontFamily: UI_FONT };

function Composer({ taskId }) {
  const [val, setVal] = React.useState('');
  const ta = React.useRef(null);
  React.useEffect(() => {
    if (!ta.current) return;
    ta.current.style.height = 'auto';
    ta.current.style.height = Math.min(160, ta.current.scrollHeight) + 'px';
  }, [val]);

  const send = () => {
    const text = val.trim();
    if (!text || !taskId) return;
    setVal('');
    const now = new Date();
    const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    window.addEventToTask(taskId, { kind: 'message', author: 'jordan', time: timeStr, body: text });
    setTimeout(() => {
      const t2 = new Date();
      const ts2 = t2.getHours() + ':' + String(t2.getMinutes()).padStart(2, '0');
      window.addEventToTask(taskId, { kind: 'thinking', author: 'aria', time: ts2, seconds: Math.floor(Math.random() * 12) + 6, reasoning: 'Reviewing the latest direction from Jordan. Assessing which active subtask this touches and whether I need to re-route.' });
      setTimeout(() => {
        const t3 = new Date();
        const ts3 = t3.getHours() + ':' + String(t3.getMinutes()).padStart(2, '0');
        window.addEventToTask(taskId, { kind: 'message', author: 'aria', time: ts3, body: 'Got it — routing to the right agent and updating the subtask queue.' });
      }, 800);
    }, 1100);
  };

  const onKeyDown = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); send(); } };

  return (
    <div style={{ borderTop: '1px solid #ECE6D5', background: '#FCFAF1', padding: '14px 36px 16px' }}>
      <div style={{ border: '1px solid #DCD3BC', borderRadius: 12, background: '#FFFEF8', padding: '10px 12px 8px', boxShadow: '0 1px 0 rgba(0,0,0,0.02)' }}>
        <textarea ref={ta} value={val} onChange={(e) => setVal(e.target.value)} onKeyDown={onKeyDown}
          placeholder="Steer the crew — @agent to direct, ⌘↵ to send" rows={1}
          style={{ width: '100%', border: 'none', outline: 'none', resize: 'none', background: 'transparent', fontFamily: UI_FONT, fontSize: 14, color: '#1C1A17', lineHeight: 1.5, padding: 4 }}
        />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 6 }}>

function NewTaskRoute({ onNewTask }) {
  const [val, setVal] = React.useState('');

  const startCrew = () => {
    const text = val.trim();
    if (!text || !onNewTask) return;
    const title = text.length > 55 ? text.slice(0, 52) + '…' : text;
    const id = window.createTask('crewai-desktop', title, text);
    setTimeout(() => {
      const t = new Date();
      const ts = t.getHours() + ':' + String(t.getMinutes()).padStart(2, '0');
      window.addEventToTask(id, { kind: 'thinking', author: 'aria', time: ts, seconds: 21, reasoning: "New task from Jordan. Reading the brief, identifying scope, decomposing into parallel subtasks, and choosing owners. I'll write the task card first." });
      setTimeout(() => {
        const t2 = new Date();
        const ts2 = t2.getHours() + ':' + String(t2.getMinutes()).padStart(2, '0');
        window.addEventToTask(id, { kind: 'message', author: 'aria', time: ts2, body: "Task card written. I'm decomposing this into subtasks and routing them to the crew now." });
      }, 1400);
    }, 900);
    onNewTask(id);
  };

  const suggestions = [
    { t: 'Audit a flow',         b: 'Have Milo run a heuristic review and write up findings.',    fill: 'Audit our main onboarding flow. Have Milo run a heuristic review and surface the top drop-off points with clear recommendations.' },
    { t: 'Refactor a component', b: 'Hand Nico a file and a constraint, get a PR back.',          fill: 'Refactor the TaskHeader component. Nico should reduce prop drilling while keeping the same external API. One PR please.' },
    { t: 'Plan a release',       b: 'Aria sequences subtasks, no code touched.',                  fill: 'Plan the next release. Aria should sequence all remaining work, identify blockers, and produce a clear timeline. No code changes yet.' },
    { t: 'Reproduce a bug',      b: 'Rae writes a failing test before anyone fixes it.',          fill: 'The composer sometimes submits twice on mobile. Rae should reproduce it and write a failing test before we touch the fix.' },
  ];

  return (
    <div style={{ height: '100%', background: '#FAF5E8', padding: '60px 36px', overflow: 'auto' }}>
      <div style={{ maxWidth: 720, margin: '0 auto' }}>
        <div style={{ fontSize: 12.5, color: '#A89F92', marginBottom: 6 }}>New task</div>
        <h1 style={{ fontSize: 28, fontWeight: 600, margin: '0 0 24px', color: '#1C1A17', letterSpacing: -0.3 }}>What should the crew tackle?</h1>
        <div style={{ border: '1px solid #DCD3BC', borderRadius: 14, background: '#FFFEF8', padding: 16, boxShadow: '0 1px 0 rgba(0,0,0,0.02)' }}>
          <textarea value={val} onChange={(e) => setVal(e.target.value)}
            onKeyDown={(e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); startCrew(); } }}
            placeholder="Describe a task. The lead agent will plan it and assign subtasks." rows={5}
            style={{ width: '100%', border: 'none', outline: 'none', resize: 'vertical', background: 'transparent', fontFamily: UI_FONT, fontSize: 15, color: '#1C1A17', lineHeight: 1.55, minHeight: 100 }}
          />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, paddingTop: 12, borderTop: '1px solid #ECE6D5' }}>
            <button style={chip}>Project ▾ crewai-desktop</button>
            <button style={chip}>Lead ▾ Aria</button>
            <button style={chip}>Plan only</button>
            <div style={{ flex: 1 }} />
            <button onClick={startCrew} style={{ ...chip, background: val.trim() ? '#1C1A17' : '#F0EAD8', color: val.trim() ? '#FCFBF7' : '#A89F92', border: '1px solid ' + (val.trim() ? '#1C1A17' : '#E6DFCC'), fontWeight: 500, padding: '6px 14px' }}>Start crew →</button>
          </div>
        </div>
        <div style={{ marginTop: 28, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {suggestions.map((s, i) => (
            <div key={i} onClick={() => setVal(s.fill)} style={{ padding: 14, borderRadius: 10, border: '1px solid #ECE6D5', background: '#FCFAF1', cursor: 'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background = '#EBE5D6'}
              onMouseLeave={e => e.currentTarget.style.background = '#FCFAF1'}>
              <div style={{ fontSize: 13.5, fontWeight: 500, color: '#1C1A17', marginBottom: 4 }}>{s.t}</div>
              <div style={{ fontSize: 12.5, color: '#807972', lineHeight: 1.5 }}>{s.b}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { TaskView, EmptyRoute, NewTaskRoute });
</script>

          <div style={{ flex: 1 }}><div style={{ fontSize: 13.5, fontWeight: 500, color: '#1C1A17' }}>{s.name}</div><div style={{ fontSize: 12, color: '#807972' }}>{s.desc}</div></div>
          <Toggle on={agent.skills.includes(s.id)}/>
        </div>
      ))}
    </div>
  );
}

function EnvTab() {
  return (
    <div style={{ ...agentCard, padding: 16 }}>
      <div style={{ fontSize: 12.5, color: '#807972', marginBottom: 12 }}>Variables loaded into every run.</div>
      {[['OPENAI_API_KEY','••••••••••••rk2c'],['PROJECT_ROOT','/Users/jordan/code/crewai-desktop'],['TZ','America/Los_Angeles']].map(([k,v]) => (
        <div key={k} style={{ display: 'grid', gridTemplateColumns: '180px 1fr 60px', gap: 8, padding: '6px 0', fontFamily: AGENTS_MONO, fontSize: 12.5 }}>
          <span style={{ color: '#5C544B' }}>{k}</span><span style={{ color: '#1C1A17' }}>{v}</span>
          <button style={{ ...ghostBtn, padding: '2px 8px', fontSize: 11.5 }}>edit</button>
        </div>
      ))}
      <button style={{ ...ghostBtn, marginTop: 10 }}>+ Add variable</button>
    </div>
  );
}

function ParamsTab() {
  return <div style={{ ...agentCard, padding: 16, fontSize: 13, color: '#807972' }}>Temperature, top-p, retry policy, and any custom JSON the runtime understands. <span style={{ color: '#C4644A' }}>Defaults are sensible — leave this empty unless you know what you're tuning.</span></div>;
}

function AgentDetail({ agent, onBack }) {
  const [tab, setTab] = React.useState('activity');
  const rt = RUNTIMES.find(r => r.id === agent.runtime);
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: '#FAF5E8' }}>
      <div style={{ padding: '16px 36px 12px', borderBottom: '1px solid #ECE6D5', display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
        <span onClick={onBack} style={{ color: '#807972', cursor: 'pointer' }}>Agents</span>
        <span style={{ color: '#C9BFA8' }}>›</span>
        <span style={{ color: '#1C1A17', fontWeight: 500 }}>{agent.name}</span>
        <div style={{ flex: 1 }}/>
        <button style={ghostBtn}>Duplicate</button>
        <button style={ghostBtn}>Retire</button>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '24px 36px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '260px 1fr', gap: 24, maxWidth: 1100 }}>
          <aside>
            <div style={{ width: 52, height: 52, borderRadius: 12, background: agent.color, color: '#FCFBF7', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, fontWeight: 600, marginBottom: 14 }}>{agent.initial}</div>
            <div style={{ fontSize: 18, fontWeight: 600, color: '#1C1A17' }}>{agent.name}</div>
            <div style={{ fontSize: 13, color: '#807972', marginBottom: 10 }}>{agent.role}</div>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '3px 10px', borderRadius: 999, fontSize: 11.5, fontWeight: 500, background: agent.status === 'busy' ? '#F7EFDD' : '#F0EAD8', color: agent.status === 'busy' ? '#C4644A' : '#807972' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: agent.status === 'busy' ? '#C4644A' : '#A89F92' }}/>
              {agent.status === 'busy' ? `${agent.active} active task${agent.active === 1 ? '' : 's'}` : 'idle'}
            </span>
            <div style={{ marginTop: 22, fontSize: 11.5, color: '#A89F92', textTransform: 'uppercase', letterSpacing: 0.4, fontWeight: 500, marginBottom: 8 }}>Properties</div>
            <PropRow label="Runtime" value={<span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><RuntimeBadge engine={rt.engine}/> {rt.engine} <span style={{ color: '#A89F92' }}>({rt.host})</span></span>}/>
            <PropRow label="Model"       value={<code style={{ fontFamily: AGENTS_MONO, fontSize: 12 }}>{agent.model}</code>}/>
            <PropRow label="Visibility"  value={agent.visibility}/>
            <PropRow label="Concurrency" value={`${agent.concurrency} parallel tasks`}/>
            <PropRow label="Owner"       value={window.AGENTS[agent.owner]?.name || agent.owner}/>
            <PropRow label="Created"     value={`${agent.created} ago`}/>
            <PropRow label="Updated"     value={`${agent.updated} ago`}/>
            <div style={{ marginTop: 22, fontSize: 11.5, color: '#A89F92', textTransform: 'uppercase', letterSpacing: 0.4, fontWeight: 500, marginBottom: 8 }}>Skills <span style={{ color: '#807972' }}>{agent.skills.length}</span></div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {agent.skills.map(sid => { const s = SKILLS.find(x => x.id === sid); return <div key={sid} style={{ padding: '6px 10px', borderRadius: 6, background: '#FCFAF1', border: '1px solid #ECE6D5', fontSize: 12.5 }}><span style={{ fontFamily: AGENTS_MONO, fontSize: 11, color: '#5C544B' }}>{s.name}</span></div>; })}
              <button style={{ padding: '5px 10px', borderRadius: 6, background: 'transparent', border: '1px dashed #DCD3BC', color: '#807972', fontSize: 12.5, cursor: 'pointer', textAlign: 'left' }}>+ Attach skill</button>
            </div>
          </aside>
          <main>
            <div style={{ display: 'flex', gap: 4, borderBottom: '1px solid #ECE6D5', marginBottom: 18 }}>
              {[['activity','Activity'],['instr','Instructions'],['skills','Skills'],['env','Env vars'],['params','Custom params']].map(([k,l]) => (
                <div key={k} onClick={() => setTab(k)} style={{ padding: '8px 12px', fontSize: 13, cursor: 'pointer', color: tab === k ? '#1C1A17' : '#807972', fontWeight: tab === k ? 500 : 400, borderBottom: '2px solid ' + (tab === k ? '#1C1A17' : 'transparent'), marginBottom: -1 }}>{l}</div>
              ))}
            </div>
            {tab === 'activity' && <ActivityTab agent={agent}/>}
            {tab === 'instr'    && <InstrTab agent={agent}/>}
            {tab === 'skills'   && <SkillsTab agent={agent}/>}
            {tab === 'env'      && <EnvTab/>}
            {tab === 'params'   && <ParamsTab/>}
          </main>
        </div>
      </div>
    </div>
  );
}


const CREW_TABS = [
  { key: 'agents',   label: 'Agents',   subtitle: 'Your crew. Pick one to edit instructions, attach skills, or tune the runtime.' },
  { key: 'skills',   label: 'Skills',   subtitle: 'Shared instructions any agent in this workspace can pick up.' },
  { key: 'runtimes', label: 'Runtimes', subtitle: 'The environments your agents run in. Add hosts, watch their health and spend.' },
];

function CrewTabs({ tab, setTab }) {
  return (
    <div style={{ display: 'flex', gap: 2, borderBottom: '1px solid #ECE6D5', marginBottom: 22 }}>
      {CREW_TABS.map(t => (
        <div key={t.key} onClick={() => setTab(t.key)} style={{
          padding: '8px 14px', fontSize: 13, cursor: 'pointer',
          color: tab === t.key ? '#1C1A17' : '#807972',
          fontWeight: tab === t.key ? 500 : 400,
          borderBottom: '2px solid ' + (tab === t.key ? '#1C1A17' : 'transparent'),
          marginBottom: -1,
        }}>{t.label}</div>
      ))}
    </div>
  );
}

function AgentsRoute() {
  const [tab, setTab] = React.useState('agents');
  const [openAgent, setOpenAgent] = React.useState(null);
  const agents = getAgentConfigs();
  const detail = openAgent ? agents.find(a => a.id === openAgent) : null;
  if (detail) return <AgentDetail agent={detail} onBack={() => setOpenAgent(null)}/>;

  const meta = CREW_TABS.find(t => t.key === tab);
  return (
    <div style={{ height: '100%', background: '#FAF5E8', overflow: 'auto' }}>
      <div style={{ padding: '28px 36px 40px', maxWidth: 1080 }}>
        <h1 style={{ fontSize: 22, fontWeight: 600, margin: '0 0 4px', color: '#1C1A17', letterSpacing: -0.2 }}>Crew</h1>
        <div style={{ fontSize: 13, color: '#807972', marginBottom: 18 }}>{meta.subtitle}</div>
        <CrewTabs tab={tab} setTab={setTab}/>
        {tab === 'agents'   && <AgentsSection onPickAgent={setOpenAgent}/>}
        {tab === 'skills'   && <SkillsSection/>}
        {tab === 'runtimes' && <RuntimesSection/>}
      </div>
    </div>
  );
}

const SkillsRoute = AgentsRoute;
const RuntimesRoute = AgentsRoute;

Object.assign(window, { AgentsRoute, SkillsRoute, RuntimesRoute });
</script>

<script type="text/babel">
// ── app ───────────────────────────────────────────────────────────────────────

const APP_DEFAULTS = /*EDITMODE-BEGIN*/{
  "deskName": "Jordan's Mac",
  "windowWidth": 1240,
  "windowHeight": 800
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(APP_DEFAULTS);
  const [currentId, setCurrentId] = React.useState('t-114');
  const [route, setRoute] = React.useState('task');
  const [tasksVersion, setTasksVersion] = React.useState(0);
  window.notifyTaskUpdate = () => setTasksVersion(v => v + 1);
  const task = window.TIMELINES[currentId];

  const handleNewTask = (id) => { setCurrentId(id); setRoute('task'); };

  const [vp, setVp] = React.useState({ w: 1280, h: 860 });
  React.useLayoutEffect(() => {
    const onResize = () => setVp({ w: window.innerWidth || 1280, h: window.innerHeight || 860 });
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const maxW = Math.max(640, Math.min(t.windowWidth,  vp.w - 48));
  const maxH = Math.max(480, Math.min(t.windowHeight, vp.h - 48));

  return (
    <>
      <div style={{ width: maxW, height: maxH, borderRadius: 12, overflow: 'hidden', display: 'flex', background: '#FAF5E8', boxShadow: '0 0 0 1px rgba(0,0,0,0.16), 0 30px 80px -10px rgba(40,30,15,0.4), 0 8px 24px rgba(40,30,15,0.18)' }}>
        <window.Sidebar currentId={currentId} onPick={setCurrentId} route={route} setRoute={setRoute} deskName={t.deskName} />
        <div style={{ flex: 1, minWidth: 0, position: 'relative', display: 'flex', flexDirection: 'column' }}>
          {route === 'task'     && task && <window.TaskView task={task} version={tasksVersion} />}
          {route === 'new'      && <window.NewTaskRoute onNewTask={handleNewTask} />}
          {route === 'agents'   && <window.AgentsRoute />}
          {route === 'skills'   && <window.SkillsRoute />}
          {route === 'runtimes' && <window.RuntimesRoute />}
          {route === 'auto'     && <window.EmptyRoute icon="auto"   title="Auto optimization" body="Suggest model swaps, prompt tightening, and tool consolidations based on the last week of runs. Off by default." />}
          {route === 'search'   && <window.EmptyRoute icon="search" title="Search"             body="Search across every conversation, edit, and file the crew has touched. ⌘K from anywhere." />}
        </div>
      </div>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Window">
          <window.TweakText label="Computer name" value={t.deskName} onChange={(v) => setTweak('deskName', v)} />
          <window.TweakSlider label="Width"  min={960} max={1600} step={20} value={t.windowWidth}  onChange={(v) => setTweak('windowWidth', v)} />
          <window.TweakSlider label="Height" min={640} max={1000} step={20} value={t.windowHeight} onChange={(v) => setTweak('windowHeight', v)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
